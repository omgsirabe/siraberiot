<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>$IR ABE</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Archivo Black', sans-serif;
      background: #ffd6e7;
      color: white;
      text-align: center;
      text-transform: uppercase;
      overflow-x: hidden;
    }

    /* STAR BACKGROUND – BIG + DENSE */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(white 3px, transparent 3px),
        radial-gradient(white 2px, transparent 2px),
        radial-gradient(white 1px, transparent 1px);
      background-size:
        28px 28px,
        18px 18px,
        10px 10px;
      animation: stars 18s linear infinite;
      z-index: -1;
      opacity: 0.85;
    }

    @keyframes stars {
      from { background-position: 0 0; }
      to { background-position: 500px -500px; }
    }

    /* TEXT OUTLINE WITHOUT OVERLAP */
    body, p, a, span, div {
      text-shadow:
        2px 2px 0 black,
        -2px 2px 0 black,
        2px -2px 0 black,
        -2px -2px 0 black,
        0 0 12px rgba(255,255,255,0.35);
    }

    h2, .ticker {
      text-shadow:
        3px 3px 0 black,
        -3px 3px 0 black,
        3px -3px 0 black,
        -3px -3px 0 black,
        0 0 16px rgba(255,255,255,0.5);
    }

    .logo-wrap img {
      width: 280px;
      margin: 30px auto 10px;
      filter: drop-shadow(6px 6px 0 black);
    }

    /* TICKER */
    .ticker-wrap {
      overflow: hidden;
      white-space: nowrap;
      font-family: Impact, sans-serif;
      font-size: 22px;
      margin-bottom: 10px;
    }

    .ticker {
      display: inline-block;
      padding-left: 100%;
      animation: ticker 7s linear infinite;
    }

    @keyframes ticker {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    .ticker .star {
      color: #ff9fcf;
    }

    /* NAV */
    .navbar {
      position: sticky;
      top: 0;
      background: #ffd6e7;
      padding: 14px 0;
      z-index: 1000;
      border-bottom: 3px solid black;
    }

    .navbar a {
      margin: 0 18px;
      color: white;
      text-decoration: none;
      font-family: 'Oswald', sans-serif;
      font-size: 18px;
    }

    section {
      padding: 70px 20px;
      border-bottom: 3px solid black;
    }

    h2 {
      font-size: 36px;
      margin-bottom: 30px;
    }

    /* RELEASE */
    .release img {
      width: 220px;
      border: 5px solid black;
      box-shadow: 6px 6px 0 black;
    }

    .release-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 36px;
      background: linear-gradient(#ff9fcf, #ff5fa9);
      color: white;
      border: 3px solid black;
      text-decoration: none;
      font-family: 'Oswald', sans-serif;
      box-shadow: inset 0 3px 0 #ffd6e7, 5px 5px 0 black;
    }

    /* SOCIALS – ICONS FIXED */
    .socials a {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 14px auto;
      width: fit-content;
      color: white;
      text-decoration: none;
      font-family: 'Oswald', sans-serif;
      font-size: 18px;
    }

    .socials img {
      width: 22px;
      image-rendering: pixelated;
      filter: none;
      box-shadow: 2px 2px 0 black;
    }

    /* STORE */
    .store-container {
      max-width: 800px;
      margin: 20px auto;
      border: 5px solid black;
      padding-top: 100%;
      position: relative;
      background: white;
    }

    .store-container iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* BULLETIN */
    .bulletin {
      max-width: 600px;
      margin: 40px auto;
      background: #c0c0c0;
      border: 4px ridge #fff;
      padding: 20px;
      color: black;
      text-shadow: none;
      font-family: 'Oswald', sans-serif;
    }

    textarea, input {
      width: 100%;
      margin-bottom: 10px;
      font-family: inherit;
    }

    button {
      padding: 6px 12px;
      font-family: inherit;
      border: 2px solid black;
      background: #e0e0e0;
    }

    footer {
      font-size: 12px;
      padding: 30px;
    }
  </style>
</head>
