<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>$IR ABE</title>

<style>
body {
  margin: 0;
  font-family: Impact, Haettenschweiler, 'Arial Black', sans-serif;
  background: #ffd6e7;
  color: white;
  text-align: center;
  text-transform: uppercase;
  overflow-x: hidden;
}

/* STAR BACKGROUND – BIGGER + DENSER */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(white 3px, transparent 3px);
  background-size: 22px 22px;
  animation: stars 25s linear infinite;
  z-index: -1;
  opacity: 0.9;
}

@keyframes stars {
  from { background-position: 0 0; }
  to { background-position: 300px -300px; }
}

/* CLEAN OUTLINE (NO STROKE) */
* {
  text-shadow:
    2px 0 0 black,
   -2px 0 0 black,
    0 2px 0 black,
    0 -2px 0 black,
    2px 2px 0 black,
   -2px -2px 0 black,
    2px -2px 0 black,
   -2px 2px 0 black;
}

.logo-wrap img {
  width: 280px;
  margin: 30px auto 10px;
  filter: drop-shadow(4px 4px 0 black);
}

/* TICKER */
.ticker-wrap {
  overflow: hidden;
  white-space: nowrap;
  font-size: 22px;
  margin-bottom: 10px;
}

.ticker {
  display: inline-block;
  padding-left: 100%;
  animation: ticker 7s linear infinite;
}

@keyframes ticker {
  from { transform: translateX(0); }
  to { transform: translateX(-100%); }
}

.ticker .star { color: #ff9fcf; }

/* NAV */
.navbar {
  position: sticky;
  top: 0;
  background: #ffd6e7;
  padding: 14px 0;
  z-index: 1000;
}

.navbar a {
  margin: 0 18px;
  color: white;
  text-decoration: none;
  font-size: 18px;
}

section {
  padding: 70px 20px;
  border-bottom: 3px solid black;
}

h2 {
  font-size: 36px;
  margin-bottom: 30px;
}

/* RELEASE */
.release img {
  width: 220px;
  border: 5px solid black;
  box-shadow: 6px 6px 0 black;
}

.release-btn {
  display: inline-block;
  margin-top: 20px;
  padding: 14px 36px;
  background: linear-gradient(#ff9fcf, #ff5fa9);
  color: white;
  border: 3px solid black;
  text-decoration: none;
  box-shadow: inset 0 2px 0 #ffd6e7, 4px 4px 0 black;
}

/* SOCIALS – ICONS FIXED */
.socials a {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 12px auto;
  width: fit-content;
  color: white;
  text-decoration: none;
  font-size: 18px;
}

.socials img {
  width: 22px;
  image-rendering: pixelated;
}

/* STORE */
.store-container {
  max-width: 800px;
  margin: 20px auto;
  border: 5px solid black;
  padding-top: 100%;
  position: relative;
  background: white;
}

.store-container iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
}

/* BULLETIN – READABLE */
.bulletin {
  max-width: 600px;
  margin: 40px auto;
  background: #c0c0c0;
  border: 4px ridge #fff;
  padding: 20px;
  color: black;
  text-shadow: none;
  font-family: Arial, sans-serif;
}

textarea, input {
  width: 100%;
  margin-bottom: 10px;
}

button {
  padding: 6px 12px;
  border: 2px solid black;
  background: #e0e0e0;
}

footer {
  font-size: 12px;
  padding: 30px;
}
</style>
</head>

<body>

<div class="logo-wrap">
  <img src="https://i.ibb.co/NnCFWYvK/B69-B5-FCF-864-C-44-A5-9166-54-FF2-C641796.png">
</div>

<div class="ticker-wrap">
  <div class="ticker">
    <span class="star">★</span> WELCOME TO HELL, WE LOVE YOU HERE! <span class="star">★</span>
  </div>
</div>

<section>
<h2>Community Board</h2>
<div class="bulletin">
<input placeholder="USERNAME">
<textarea placeholder="WRITE ANYTHING"></textarea>
<button>POST</button>
</div>
</section>

<footer>© 2026 $IR ABE</footer>

</body>
</html>
