<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>$IR ABE</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Anton', sans-serif;
      background: #ffd6e7;
      color: white;
      text-align: center;
      text-transform: uppercase;
      overflow-x: hidden;
    }

    /* STAR BACKGROUND */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: radial-gradient(white 1.5px, transparent 1.5px);
      background-size: 40px 40px;
      animation: stars 30s linear infinite;
      z-index: -1;
      opacity: 0.7;
    }

    @keyframes stars {
      from { background-position: 0 0; }
      to { background-position: 400px -400px; }
    }

    * {
      text-shadow: 2px 2px 0 black, 0 0 10px rgba(255,255,255,0.4);
      -webkit-text-stroke: 1px black;
    }

    .logo-wrap img {
      width: 280px;
      margin: 30px auto 10px;
      filter: drop-shadow(4px 4px 0 black);
    }

    /* TICKER */
    .ticker-wrap {
      overflow: hidden;
      background: transparent;
      white-space: nowrap;
      font-family: Impact, sans-serif;
      font-size: 22px;
      margin-bottom: 10px;
    }

    .ticker {
      display: inline-block;
      padding-left: 100%;
      animation: ticker 7s linear infinite;
    }

    @keyframes ticker {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    .ticker .star {
      color: #ff9fcf;
    }

    /* NAV */
    .navbar {
      position: sticky;
      top: 0;
      background: #ffd6e7;
      padding: 14px 0;
      z-index: 1000;
    }

    .navbar a {
      margin: 0 18px;
      color: white;
      text-decoration: none;
      font-family: 'Oswald', sans-serif;
      font-size: 18px;
    }

    section {
      padding: 70px 20px;
      border-bottom: 3px solid black;
    }

    h2 {
      font-size: 36px;
      margin-bottom: 30px;
    }

    /* RELEASE */
    .release img {
      width: 220px;
      border: 5px solid black;
      box-shadow: 6px 6px 0 black;
    }

    .release-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 36px;
      background: linear-gradient(#ff9fcf, #ff5fa9);
      color: white;
      border: 3px solid black;
      text-decoration: none;
      font-family: 'Oswald', sans-serif;
      box-shadow: inset 0 2px 0 #ffd6e7, 4px 4px 0 black;
    }

    /* SOCIALS */
    .socials a {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 12px auto;
      width: fit-content;
      color: white;
      text-decoration: none;
      font-family: 'Oswald', sans-serif;
      font-size: 18px;
    }

    .socials img {
      width: 22px;
      image-rendering: pixelated;
      filter: brightness(0) invert(1);
    }

    /* STORE */
    .store-container {
      max-width: 800px;
      margin: 20px auto;
      border: 5px solid black;
      padding-top: 100%;
      position: relative;
      background: white;
    }

    .store-container iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* BULLETIN */
    .bulletin {
      max-width: 600px;
      margin: 40px auto;
      background: #c0c0c0;
      border: 4px ridge #fff;
      padding: 20px;
      color: black;
      text-shadow: none;
      -webkit-text-stroke: 0;
      font-family: 'Oswald', sans-serif;
    }

    textarea, input {
      width: 100%;
      margin-bottom: 10px;
      font-family: inherit;
    }

    button {
      padding: 6px 12px;
      font-family: inherit;
      border: 2px solid black;
      background: #e0e0e0;
    }

    footer {
      font-size: 12px;
      padding: 30px;
    }
  </style>
</head>
<body>

  <!-- MUSIC (requires user interaction on modern browsers) -->
  <iframe src="https://www.youtube.com/embed/QQ0swT8i0e8?autoplay=1&loop=1&playlist=QQ0swT8i0e8" allow="autoplay" style="display:none"></iframe>

  <div class="logo-wrap">
    <img src="https://i.ibb.co/NnCFWYvK/B69-B5-FCF-864-C-44-A5-9166-54-FF2-C641796.png" alt="Sir Abe Logo">
  </div>

  <div class="ticker-wrap">
    <div class="ticker">
      <span class="star">★</span> WELCOME TO HELL, WE LOVE YOU HERE! <span class="star">★</span>
    </div>
  </div>

  <div class="navbar">
    <a href="#home">Home</a>
    <a href="#store">Store</a>
    <a href="#shows">Shows</a>
    <a href="#about">About</a>
  </div>

  <section id="home">
    <h2>Rose Gold (2 Pack) – 1/30</h2>
    <div class="release">
      <a href="https://distrokid.com/hyperfollow/irabe/rose-gold?ref=release" target="_blank">
        <img src="https://i.ibb.co/qZzVv7H/3000x3000-3263302-CFF82979-577-B-4-D3-A-B4-DC96-DE4-F3-EEA8-A-0-746244-IMG2091.jpg">
      </a>
      <br>
      <a class="release-btn" href="https://distrokid.com/hyperfollow/irabe/rose-gold?ref=release" target="_blank">CLICK ME FOR ROSE GOLD</a>
    </div>

    <div class="socials">
      <a href="https://instagram.com/sirabe__" target="_blank"><img src="https://icons.iconarchive.com/icons/dakirby309/windows-8-metro/256/Apps-Instagram-icon.png">Instagram</a>
      <a href="https://www.youtube.com/@siraberiot" target="_blank"><img src="https://icons.iconarchive.com/icons/dakirby309/windows-8-metro/256/Web-YouTube-icon.png">YouTube</a>
      <a href="https://www.tiktok.com/@siraberiott" target="_blank"><img src="https://icons.iconarchive.com/icons/custom-icon-design/pretty-office-11/256/tiktok-icon.png">TikTok</a>
      <a href="https://discord.gg/hEAJYdT5um" target="_blank"><img src="https://icons.iconarchive.com/icons/papirus-team/papirus-apps/256/discord-icon.png">Discord</a>
      <a href="https://sir-abe-store.printify.me/" target="_blank"><img src="https://icons.iconarchive.com/icons/oxygen-icons.org/oxygen/256/Actions-document-open-icon.png">Store</a>
      <a href="https://boxd.it/aph3x" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/9/9b/Letterboxd_2023_logo.png">Letterboxd</a>
    </div>
  </section>

  <section id="store">
    <h2>Store</h2>
    <div class="store-container">
      <iframe src="https://sir-abe-store.printify.me"></iframe>
    </div>
  </section>

  <section id="shows">
    <h2>Shows / Events</h2>
    <p>TBA</p>
  </section>

  <section>
    <h2>Community Board</h2>
    <div class="bulletin">
      <input id="user" placeholder="USERNAME">
      <textarea id="msg" placeholder="WRITE ANYTHING" rows="4"></textarea>
      <button onclick="post()">POST</button>
      <div id="posts"></div>
    </div>
  </section>

  <section id="about">
    <h2>About</h2>
    <p>Official website for $IR ABE.</p>
  </section>

  <footer>
    © 2026 $IR ABE
  </footer>

  <script>
    const banned = ['rape','slur'];
    const posts = JSON.parse(localStorage.getItem('posts') || '[]');
    const el = document.getElementById('posts');

    function render(){
      el.innerHTML = posts.map(p=>`<p><b>${p.u}</b>: ${p.m}</p>`).join('');
    }
    render();

    function post(){
      if(localStorage.getItem('posted')) return alert('One message per visit');
      const u = user.value.trim();
      const m = msg.value.trim();
      if(!u || !m) return;
      if(banned.some(w=>m.toLowerCase().includes(w))) return alert('Message blocked');
      posts.push({u,m});
      localStorage.setItem('posts', JSON.stringify(posts));
      localStorage.setItem('posted','1');
      render();
    }
  </script>

</body>
</html>
